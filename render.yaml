version: "1"
projects:
- name: My project
  environments:
  - name: Production
    services:
    - type: web
      name: phoneReminder
      runtime: docker
      repo: https://github.com/Cardigan/vibeChallenge0410
      plan: starter
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reminder-db
          property: connectionString
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: PORT
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      region: oregon
      dockerContext: .
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit

databases:
  - name: reminder-db
    plan: free
