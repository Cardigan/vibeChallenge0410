<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Reminder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>📞 Phone Reminder</h1>
    <p class="subtitle">Schedule a call to remind you at the right time.</p>

    <div id="twilio-warning" class="warning" style="display:none">
      ⚠️ Twilio not configured — reminders will fire but calls won't be made.
      See <code>.env.example</code> for setup instructions.
    </div>

    <form id="reminder-form">
      <label for="phone">Phone Number</label>
      <input
        type="tel"
        id="phone"
        placeholder="4155551234"
        required
      />

      <label for="reminder-time">Reminder Time</label>
      <input
        type="datetime-local"
        id="reminder-time"
        required
      />

      <div class="btn-row">
        <button type="submit" class="submit-btn">Set Reminder</button>
        <button type="button" class="test-btn" id="test-call-btn">📞 Test Call Now</button>
      </div>
    </form>

    <div id="feedback" class="feedback"></div>

    <h2>Upcoming Reminders</h2>
    <div id="reminder-list">
      <p class="empty">No upcoming reminders.</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
